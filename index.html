<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Наша Сказка - Интерактивный Сайт</title>
  <style>
    /* ========================================
       СБРОС СТИЛЕЙ И БАЗОВЫЕ НАСТРОЙКИ
       ======================================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      font-weight: normal;
      font-style: normal;
      line-height: 1.6;
      color: #2c2c2c;
      background-color: #ffffff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ========================================
       ФОНОВОЕ ИЗОБРАЖЕНИЕ - ОРИГИНАЛ
       ======================================== */
    .background {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      z-index: -2;
    }

    /* ========================================
       КОНТЕЙНЕР И ОБЩАЯ СТРУКТУРА
       ======================================== */
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 30px 20px 50px 20px;
      position: relative;
      z-index: 1;
    }

    /* ========================================
       СЕКЦИИ (БЛОКИ)
       ======================================== */
    .block {
      margin-bottom: 70px;
      padding: 35px;
      background-color: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 6px 25px rgba(0, 0, 0, 0.12);
      transition: box-shadow 0.3s ease-in-out;
    }

    .block:hover {
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.18);
    }

    .block h2 {
      font-size: 2.2rem;
      font-weight: bold;
      color: #1a1a1a;
      margin-bottom: 30px;
      padding-bottom: 18px;
      border-bottom: 4px solid #8b7355;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* ========================================
       ГАЛЕРЕЯ - СЕТКА С ЗАЩИТОЙ ОТ НАЛОЖЕНИЯ
       ======================================== */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      grid-auto-rows: minmax(280px, auto);
      gap: 35px 30px;
      justify-items: center;
      align-items: start;
      padding: 10px 5px;
    }

    /* ========================================
       ЭЛЕМЕНТ ГАЛЕРЕИ (ИЗОБРАЖЕНИЕ + ПОДПИСЬ)
       ======================================== */
    .gallery-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      cursor: pointer;
      transition: transform 0.25s ease-in-out;
      padding: 15px 10px;
      border-radius: 15px;
      background-color: transparent;
      width: 100%;
      max-width: 250px;
    }

    .gallery-item:hover {
      transform: translateY(-5px) scale(1.02);
      background-color: rgba(139, 115, 85, 0.08);
    }

    .gallery-item:active {
      transform: translateY(-2px) scale(0.99);
    }

    /* ========================================
       ИЗОБРАЖЕНИЕ - ФИКСИРОВАННЫЙ РАЗМЕР
       ======================================== */
    .gallery-item img {
      width: 200px;
      height: 200px;
      object-fit: contain;
      border-radius: 12px;
      margin-bottom: 15px;
      border: 4px solid transparent;
      transition: all 0.25s ease-in-out;
      background-color: rgba(255, 255, 255, 0.9);
      padding: 8px;
      display: block;
      flex-shrink: 0;
    }

    .gallery-item:hover img {
      border-color: #8b7355;
      box-shadow: 0 6px 20px rgba(139, 115, 85, 0.35);
    }

    /* ========================================
       ПОДПИСЬ ПОД ИЗОБРАЖЕНИЕМ
       ======================================== */
    .gallery-item span {
      font-size: 1.1rem;
      font-weight: 600;
      color: #333333;
      text-align: center;
      padding: 8px 15px;
      background-color: rgba(139, 115, 85, 0.18);
      border-radius: 8px;
      width: 100%;
      max-width: 200px;
      word-wrap: break-word;
    }

    /* ========================================
       БЛОК ДИАЛОГА
       ======================================== */
    .dialog-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 30px;
      background-color: rgba(139, 115, 85, 0.08);
      border-radius: 15px;
      border: 3px solid rgba(139, 115, 85, 0.25);
    }

    .dialog-btn {
      padding: 18px 40px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #ffffff;
      background-color: #8b7355;
      border: 3px solid #6b5344;
      border-radius: 35px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    .dialog-btn:hover {
      background-color: #6b5344;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
    }

    .dialog-btn:active {
      transform: translateY(-1px);
    }

    .dialog-btn.playing {
      background-color: #4a7c59;
      border-color: #3a6c49;
      animation: pulse-button 1.5s ease-in-out infinite;
    }

    @keyframes pulse-button {
      0% {
        box-shadow: 0 0 0 0 rgba(74, 124, 89, 0.7);
      }
      50% {
        box-shadow: 0 0 0 15px rgba(74, 124, 89, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(74, 124, 89, 0);
      }
    }

    .dialog-info {
      text-align: center;
      color: #555555;
      font-size: 1.05rem;
      font-style: italic;
    }

    .dialog-info p {
      margin: 0;
    }

    /* ========================================
       БЛОК СКАЗКИ
       ======================================== */
    .story-text {
      font-size: 1.15rem;
      line-height: 1.9;
      color: #2c2c2c;
      text-align: justify;
      padding: 25px 30px;
      background-color: rgba(255, 255, 255, 0.98);
      border-radius: 12px;
      border-left: 6px solid #8b7355;
      max-height: 600px;
      overflow-y: auto;
    }

    .story-text p {
      margin-bottom: 18px;
      text-indent: 35px;
    }

    .story-text p:first-child {
      text-indent: 0;
    }

    /* ========================================
       УПРАВЛЕНИЕ МУЗЫКОЙ
       ======================================== */
    .music-control {
      position: fixed;
      bottom: 25px;
      right: 25px;
      z-index: 100;
    }

    .music-btn {
      padding: 14px 28px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #ffffff;
      background-color: #8b7355;
      border: 3px solid #6b5344;
      border-radius: 30px;
      cursor: pointer;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.25);
    }

    .music-btn:hover {
      background-color: #6b5344;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
    }

    .music-btn:active {
      transform: translateY(-1px);
    }

    .music-btn.playing {
      background-color: #4a7c59;
      border-color: #3a6c49;
    }

    /* ========================================
       АНИМАЦИИ И ЭФФЕКТЫ
       ======================================== */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(25px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .block {
      animation: fadeIn 0.7s ease-out forwards;
    }

    #locations {
      animation-delay: 0.1s;
    }

    #characters {
      animation-delay: 0.2s;
    }

    #artifacts {
      animation-delay: 0.3s;
    }

    #dialog {
      animation-delay: 0.4s;
    }

    #story {
      animation-delay: 0.5s;
    }

    /* Эффект при воспроизведении звука */
    .gallery-item.playing img {
      border-color: #4a7c59;
      box-shadow: 0 0 25px rgba(74, 124, 89, 0.6);
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.05);
      }
      100% {
        transform: scale(1);
      }
    }

    /* ========================================
       ПРОКРУТКА ДЛЯ БЛОКА СКАЗКИ
       ======================================== */
    .story-text::-webkit-scrollbar {
      width: 10px;
    }

    .story-text::-webkit-scrollbar-track {
      background: rgba(139, 115, 85, 0.12);
      border-radius: 5px;
    }

    .story-text::-webkit-scrollbar-thumb {
      background: #8b7355;
      border-radius: 5px;
      border: 2px solid rgba(255, 255, 255, 0.3);
    }

    .story-text::-webkit-scrollbar-thumb:hover {
      background: #6b5344;
    }

    /* ========================================
       АДАПТИВНЫЙ ДИЗАЙН - ПЛАНШЕТЫ
       ======================================== */
    @media screen and (max-width: 1200px) {
      .container {
        padding: 25px 15px 40px 15px;
      }
      
      .block {
        padding: 30px 25px;
        margin-bottom: 60px;
      }
      
      .block h2 {
        font-size: 2rem;
      }
      
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        grid-auto-rows: minmax(260px, auto);
        gap: 30px 25px;
      }
      
      .gallery-item {
        max-width: 230px;
      }
      
      .gallery-item img {
        width: 180px;
        height: 180px;
      }
      
      .dialog-btn {
        padding: 16px 35px;
        font-size: 1.1rem;
      }
    }

    /* ========================================
       АДАПТИВНЫЙ ДИЗАЙН - МОБИЛЬНЫЕ УСТРОЙСТВА
       ======================================== */
    @media screen and (max-width: 900px) {
      html {
        font-size: 15px;
      }
      
      .container {
        padding: 20px 12px 35px 12px;
      }
      
      .block {
        padding: 25px 20px;
        margin-bottom: 50px;
      }
      
      .block h2 {
        font-size: 1.8rem;
        margin-bottom: 25px;
        padding-bottom: 15px;
      }
      
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        grid-auto-rows: minmax(240px, auto);
        gap: 25px 20px;
      }
      
      .gallery-item {
        max-width: 200px;
        padding: 12px 8px;
      }
      
      .gallery-item img {
        width: 160px;
        height: 160px;
        margin-bottom: 12px;
      }
      
      .gallery-item span {
        font-size: 1rem;
        padding: 7px 12px;
      }
      
      .dialog-container {
        padding: 30px 25px;
      }
      
      .dialog-btn {
        padding: 14px 30px;
        font-size: 1.05rem;
      }
      
      .story-text {
        font-size: 1.05rem;
        line-height: 1.8;
        padding: 20px 25px;
      }
      
      .story-text p {
        text-indent: 28px;
        margin-bottom: 15px;
      }
      
      .music-control {
        bottom: 20px;
        right: 20px;
      }
      
      .music-btn {
        padding: 12px 24px;
        font-size: 1rem;
      }
    }

    /* ========================================
       АДАПТИВНЫЙ ДИЗАЙН - МАЛЕНЬКИЕ ЭКРАНЫ
       ======================================== */
    @media screen and (max-width: 600px) {
      html {
        font-size: 14px;
      }
      
      .container {
        padding: 15px 10px 30px 10px;
      }
      
      .block {
        padding: 20px 15px;
        margin-bottom: 40px;
      }
      
      .block h2 {
        font-size: 1.6rem;
        margin-bottom: 20px;
        padding-bottom: 12px;
        letter-spacing: 2px;
      }
      
      .gallery {
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        grid-auto-rows: minmax(220px, auto);
        gap: 20px 15px;
      }
      
      .gallery-item {
        max-width: 170px;
        padding: 10px 6px;
      }
      
      .gallery-item img {
        width: 140px;
        height: 140px;
        margin-bottom: 10px;
        padding: 6px;
      }
      
      .gallery-item span {
        font-size: 0.95rem;
        padding: 6px 10px;
      }
      
      .dialog-container {
        padding: 25px 20px;
      }
      
      .dialog-btn {
        padding: 12px 25px;
        font-size: 1rem;
      }
      
      .story-text {
        font-size: 1rem;
        line-height: 1.7;
        padding: 18px 20px;
      }
      
      .story-text p {
        text-indent: 25px;
        margin-bottom: 12px;
      }
      
      .music-btn {
        padding: 10px 20px;
        font-size: 0.95rem;
      }
    }

    /* ========================================
       ОЧЕНЬ МАЛЕНЬКИЕ ЭКРАНЫ
       ======================================== */
    @media screen and (max-width: 400px) {
      .gallery {
        grid-template-columns: 1fr;
        grid-auto-rows: auto;
        gap: 18px;
      }
      
      .gallery-item {
        max-width: 100%;
      }
      
      .gallery-item img {
        width: 120px;
        height: 120px;
      }
      
      .block h2 {
        font-size: 1.4rem;
      }
      
      .dialog-btn {
        padding: 10px 20px;
        font-size: 0.95rem;
      }
    }

    /* ========================================
       ДОСТУПНОСТЬ
       ======================================== */
    .gallery-item:focus {
      outline: 4px solid #4a7c59;
      outline-offset: 3px;
    }

    .dialog-btn:focus {
      outline: 4px solid #4a7c59;
      outline-offset: 3px;
    }

    .music-btn:focus {
      outline: 4px solid #4a7c59;
      outline-offset: 3px;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ========================================
       ПЕЧАТНАЯ ВЕРСИЯ
       ======================================== */
    @media print {
      .background,
      .music-control,
      .dialog-btn {
        display: none;
      }
      
      .block {
        break-inside: avoid;
        box-shadow: none;
        border: 2px solid #cccccc;
        page-break-inside: avoid;
      }
      
      .gallery-item {
        break-inside: avoid;
        page-break-inside: avoid;
      }
      
      .story-text {
        max-height: none;
        overflow: visible;
      }
      
      .gallery {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }
      
      .dialog-container {
        border: 2px solid #cccccc;
      }
    }
  </style>
</head>
<body>

  <!-- Фоновая музыка -->
  <audio id="bgMusic" loop>
    <source src="" type="audio/mpeg">

  <!-- Фоновое изображение -->
  <div class="background" style="background-image: url('https://e8399487-hue.github.io/Lor2/Фон.png');"></div>

  <!-- Основной контент - виден сразу -->

          <img src="https://e8399487-hue.github.io/Lor2/л1.png" alt="Лира">

    <!-- Блок 5: Сказка -->
    <section class="block" id="story">
      <h2>📖 Наша сказка</h2>

  <!-- JavaScript -->
  <script>
    /* ========================================
       ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ СТРАНИЦЫ
       ======================================== */
    document.addEventListener('DOMContentLoaded', function() {
      
      // ========================================
      // ПОЛУЧЕНИЕ ЭЛЕМЕНТОВ
      // ========================================
      const bgMusic = document.getElementById('bgMusic');
      const toggleMusicBtn = document.getElementById('toggleMusic');
      const galleryItems = document.querySelectorAll('.gallery-item');
      const storyContent = document.getElementById('storyContent');
      const playDialogBtn = document.getElementById('playDialog');
      
      // ========================================
      // ПЕРЕМЕННЫЕ СОСТОЯНИЯ
      // ========================================
      let isBgMusicPlaying = false;
      let currentAudio = null;
      const basePath = 'https://e8399487-hue.github.io/Lor2/';
      
      // ========================================
      // ФОНОВАЯ МУЗЫКА
      // ========================================
      
      toggleMusicBtn.addEventListener('click', function() {
        if (isBgMusicPlaying) {
          // Остановить музыку
          bgMusic.pause();
          bgMusic.currentTime = 0;
          toggleMusicBtn.textContent = '🎵 Включить музыку';
          toggleMusicBtn.classList.remove('playing');
          isBgMusicPlaying = false;
          console.log('Фоновая музыка остановлена');
        } else {
          // Включить музыку
          const bgMusicPath = basePath + encodeURIComponent('Фон.mp3');
          bgMusic.src = bgMusicPath;
          
          bgMusic.play().then(function() {
            toggleMusicBtn.textContent = '⏸️ Выключить музыку';
            toggleMusicBtn.classList.add('playing');
            isBgMusicPlaying = true;
            console.log('Фоновая музыка играет');
          }).catch(function(error) {
            console.error('Ошибка воспроизведения:', error);
            alert('Не удалось включить музыку. Проверьте файл Фон.mp3');
          });
        }
      });
      
      // ========================================
      // ДИАЛОГ
      // ========================================
      
      playDialogBtn.addEventListener('click', function() {
        // Остановить текущий звук
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.currentTime = 0;
          currentAudio = null;
        }
        removeAllPlayingEffects();
        
        const dialogPath = basePath + encodeURIComponent('Диалог.mp3');
        currentAudio = new Audio(dialogPath);
        
        currentAudio.play().then(function() {
          playDialogBtn.textContent = '⏹️ Остановить диалог';
          playDialogBtn.classList.add('playing');
          console.log('Диалог играет');
        }).catch(function(error) {
          console.error('Ошибка воспроизведения диалога:', error);
          alert('Не удалось воспроизвести диалог');
        });
        
        currentAudio.onended = function() {
          playDialogBtn.textContent = '▶️ Воспроизвести диалог';
          playDialogBtn.classList.remove('playing');
          currentAudio = null;
        };
      });
      
      // ========================================
      // ЗВУКИ ГАЛЕРЕИ
      // ========================================
      
      galleryItems.forEach(function(item) {
        item.addEventListener('click', function(e) {
          e.stopPropagation();
          
          const soundName = this.getAttribute('data-sound');
          const audioPath = basePath + encodeURIComponent(soundName + '.mp3');
          
          console.log('Воспроизведение:', soundName);
          
          // Остановить текущий звук
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
          }
          
          // Убрать эффекты
          removeAllPlayingEffects();
          
          // Создать и воспроизвести новый звук
          currentAudio = new Audio(audioPath);
          
          currentAudio.play().then(function() {
            // Добавить эффект
            item.classList.add('playing');
            console.log('Играет:', soundName);
          }).catch(function(error) {
            console.error('Ошибка:', error);
            alert('Не удалось воспроизвести звук: ' + soundName);
            item.classList.remove('playing');
          });
          
          currentAudio.onended = function() {
            item.classList.remove('playing');
            currentAudio = null;
            console.log('Завершен:', soundName);
          };
        });
      });
      
      // ========================================
      // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
      // ========================================
      
      function removeAllPlayingEffects() {
        galleryItems.forEach(function(item) {
          item.classList.remove('playing');
        });
        playDialogBtn.classList.remove('playing');
        playDialogBtn.textContent = '▶️ Воспроизвести диалог';
      }
      
      // ========================================
      // ЗАГРУЗКА СКАЗКИ
      // ========================================
      
      function loadStoryText() {
        const storyPath = basePath + 'Lor.txt';
        
        fetch(storyPath)
          .then(function(response) {
            if (!response.ok) {
              throw new Error('Файл не найден');
            }
            return response.text();
          })
          .then(function(text) {
            storyContent.innerHTML = '';
            const paragraphs = text.split(/\n\s*\n/);
            
            paragraphs.forEach(function(paragraph) {
              const trimmed = paragraph.trim();
              if (trimmed !== '') {
                const p = document.createElement('p');
                p.textContent = trimmed;
                storyContent.appendChild(p);
              }
            });
            
            if (storyContent.children.length === 0 && text.trim() !== '') {
              const p = document.createElement('p');
              p.textContent = text.trim();
              storyContent.appendChild(p);
            }
            
            console.log('Сказка загружена');
          })
          .catch(function(error) {
            console.error('Ошибка загрузки сказки:', error);
            storyContent.innerHTML = '<p>Не удалось загрузить текст сказки.</p>';
          });
      }
      
      loadStoryText();
      
      // ========================================
      // КЛАВИШИ УПРАВЛЕНИЯ
      // ========================================
      
      document.addEventListener('keydown', function(e) {
        // Escape - остановить звук
        if (e.key === 'Escape') {
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
            removeAllPlayingEffects();
            console.log('Остановлено');
          }
        }
        
        // M - фоновая музыка
        if (e.key === 'm' || e.key === 'M') {
          e.preventDefault();
          toggleMusicBtn.click();
        }
        
        // D - диалог
        if (e.key === 'd' || e.key === 'D') {
          e.preventDefault();
          playDialogBtn.click();
        }
      });
      
      // Клик вне элементов - остановить звук
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.gallery-item') && !e.target.closest('.dialog-btn') && !e.target.closest('.music-btn')) {
          if (currentAudio) {
            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio = null;
            removeAllPlayingEffects();
          }
        }
      });
      
      // ========================================
      // КОНСОЛЬ ИНФОРМАЦИИ
      // ========================================
      
      console.log('=== САЙТ ЗАГРУЖЕН ===');
      console.log('Путь:', basePath);
      console.log('Элементов:', galleryItems.length);
      console.log('Нажмите F12 для просмотра консоли');
      console.log('====================');
      
    });
  </script>

</body>
</html>
